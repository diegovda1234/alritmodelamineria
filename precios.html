<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Precios — Al Ritmo de la Mineria</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400&display=swap');
        :root {
            --copper:#B87333; --gold:#e2b96f; --night:#0F1C2E; --slate:#3B5070;
            --bg:#F7F9FC; --card:#fff; --text:#1A2535; --muted:#5B6E84;
            --rule:#D1D8E0; --green:#22c55e; --red:#ef4444; --yellow:#eab308; --light:#EEF2F7;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
        .top-bar {
            background:var(--night); color:white; padding:12px 20px;
            display:flex; align-items:center; justify-content:space-between;
            border-bottom:2px solid var(--copper);
        }
        .top-bar a { color:var(--gold); text-decoration:none; font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
        .top-bar a:hover { text-decoration:underline; }
        .top-bar h1 { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:white; }
        .container { max-width:960px; margin:0 auto; padding:24px 16px 48px; }

        /* Source badge */
        .source-badge {
            display:inline-flex; align-items:center; gap:6px;
            background:var(--light); border:1px solid var(--rule); border-radius:8px;
            padding:8px 14px; font-size:11px; color:var(--muted); margin-bottom:20px;
        }
        .source-badge strong { color:var(--night); }

        /* Commodity row */
        .commodity-row {
            background:var(--card); border:1px solid var(--rule); border-radius:10px;
            margin-bottom:12px; overflow:hidden;
        }
        .cr-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 18px; cursor:pointer; user-select:none;
            -webkit-tap-highlight-color:transparent;
        }
        .cr-header:hover { background:var(--light); }
        .cr-left { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }
        .cr-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .cr-dot.up { background:var(--green); }
        .cr-dot.down { background:var(--red); }
        .cr-dot.flat { background:var(--yellow); }
        .cr-name { font-weight:700; font-size:14px; color:var(--night); }
        .cr-price { font-family:'DM Mono',monospace; font-size:14px; font-weight:600; color:var(--text); }
        .cr-unit { font-size:11px; color:var(--muted); margin-left:4px; }
        .cr-change { font-size:12px; font-weight:600; margin-left:12px; white-space:nowrap; }
        .cr-change.up { color:var(--green); }
        .cr-change.down { color:var(--red); }
        .cr-change.flat { color:var(--yellow); }
        .cr-arrow { font-size:10px; color:var(--copper); transition:transform .3s; flex-shrink:0; margin-left:8px; }
        .commodity-row.open .cr-arrow { transform:rotate(180deg); }

        /* Expanded detail */
        .cr-detail { display:none; padding:0 18px 18px; }
        .commodity-row.open .cr-detail { display:block; }

        /* Chart container */
        .chart-wrap {
            background:var(--light); border-radius:8px; padding:12px;
            margin-bottom:12px; position:relative;
        }
        .chart-wrap svg { display:block; width:100%; }

        /* Data table inside detail */
        .cr-table { width:100%; border-collapse:collapse; font-size:12px; }
        .cr-table th {
            text-align:left; font-size:9px; text-transform:uppercase; letter-spacing:.8px;
            color:var(--muted); font-weight:600; padding:6px 8px;
            border-bottom:2px solid var(--rule);
        }
        .cr-table td {
            padding:6px 8px; font-family:'DM Mono',monospace; font-size:12px;
            border-bottom:1px solid var(--light); color:var(--text);
        }
        .cr-table td:first-child { font-family:'DM Sans',sans-serif; font-weight:600; color:var(--night); }
        .cr-table .src { font-size:10px; color:var(--muted); font-family:'DM Sans',sans-serif; font-style:italic; }

        /* Tooltip */
        .chart-tooltip {
            position:absolute; background:var(--night); color:white; padding:6px 10px;
            border-radius:6px; font-size:11px; pointer-events:none; display:none;
            white-space:nowrap; z-index:10; font-family:'DM Mono',monospace;
        }

        /* Mobile */
        @media(max-width:600px) {
            .cr-unit { display:none; }
            .cr-name { font-size:13px; }
            .cr-price { font-size:13px; }
        }

        footer { text-align:center; font-size:11px; color:var(--muted); padding:20px; border-top:1px solid var(--rule); }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="display:flex;align-items:center;gap:10px;"><button onclick="history.back()" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;transition:.2s;" onmouseover="this.style.background='rgba(255,255,255,.14)'" onmouseout="this.style.background='rgba(255,255,255,.08)'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Atras</button><a href="index.html" style="color:rgba(255,255,255,.6);text-decoration:none;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='rgba(255,255,255,.6)'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg> Inicio</a></div>
    <h1>Historial de Precios</h1>
    <div style="display:flex;align-items:center;gap:6px;"><a href="escuela.html" style="color:rgba(255,255,255,.55);text-decoration:none;font-size:12px;font-weight:500;padding:4px 8px;border-radius:5px;transition:.2s;">Escuela</a> <a href="proyecciones.html" style="color:rgba(255,255,255,.55);text-decoration:none;font-size:12px;font-weight:500;padding:4px 8px;border-radius:5px;transition:.2s;">Proyecciones</a> <a href="precios.html" style="color:var(--gold);text-decoration:none;font-size:12px;font-weight:700;padding:4px 8px;border-radius:5px;background:rgba(226,185,111,.12);transition:.2s;">Precios</a></div>
</div>

<div class="container">
    <div class="source-badge">
        <strong>Fuentes:</strong> LME (Cu, Co) &middot; Kitco (Au, Ag, Pt, Pd, Rh) &middot; SMM/Fastmarkets (Li, NdPr) &middot; Banco Central (CLP/USD) &middot; IMARC (H2SO4)
    </div>

    <div id="commodity-list"></div>
</div>

<footer>Historial acumulativo desde Edicion N.1 &middot; Al Ritmo de la Mineria &middot; Diego Varleta</footer>

<script>
// ═══ DATA — Single source of truth ═══
// Each edition's prices come from the Noticiero Minero of that week.
// Add new editions here; the UI builds automatically.
var EDITIONS = [
    { id: 1, label: 'Ed.1', date: '12/03' },
    { id: 2, label: 'Ed.2', date: '13/03' },
    { id: 3, label: 'Ed.3', date: '17/03' },
    { id: 4, label: 'Ed.4', date: '24/03' },
    { id: 5, label: 'Ed.5', date: '01/04' },
    { id: 6, label: 'Ed.6', date: '07/04' },
    { id: 7, label: 'Ed.7', date: '14/04' },
    { id: 8, label: 'Ed.8', date: '21/04' },
    { id: 9, label: 'Ed.9', date: '28/04' }
];

var COMMODITIES = [
    {
        name: 'Cobre', unit: 'USD/t', source: 'LME',
        prices: [12400, 12530, 12678, 12201, 12200, 12424, 12630, 13320, 13076]
    },
    {
        name: 'Cobre', unit: 'USD/lb', source: 'LME',
        prices: [5.63, 5.68, 5.75, 5.45, 5.55, 5.90, 5.81, 6.04, 5.93]
    },
    {
        name: 'Litio Carbonato', unit: 'USD/t', source: 'SMM',
        prices: [18500, 19200, 20256, 24086, 20100, 21650, 21650, 22500, 24500]
    },
    {
        name: 'Platino', unit: 'USD/oz', source: 'Kitco',
        prices: [1580, 1610, 1650, 1905, 1978, 1991, 2044, 2074, 1959]
    },
    {
        name: 'Paladio', unit: 'USD/oz', source: 'Kitco',
        prices: [1640, 1655, 1685, 1388, 1523, 1501, 1507, 1576, 1490]
    },
    {
        name: 'Rodio', unit: 'USD/oz', source: 'Kitco',
        prices: [11200, 11500, 11700, 10000, 10250, 10350, 10100, 9800, 9900]
    },
    {
        name: 'NdPr Oxido', unit: 'USD/kg', source: 'Fastmarkets',
        prices: [96.5, 102.0, 108.64, 108.64, 108.64, 124.87, 126.0, 126.0, 137.0]
    },
    {
        name: 'Cobalto', unit: 'USD/t', source: 'LME',
        prices: [54800, 55500, 56290, 56290, 56290, 56290, 56290, 56290, 56290]
    },
    {
        name: 'Oro', unit: 'USD/oz', source: 'Kitco',
        prices: [5350, 5114, 5025, 4419, 4747, 4656, 4735, 4782, 4600]
    },
    {
        name: 'Plata', unit: 'USD/oz', source: 'Kitco',
        prices: [88.20, 83.97, 80.10, 69.54, 75.07, 72.26, 75.55, 79.50, 73.5]
    },
    {
        name: 'CLP/USD', unit: 'CLP', source: 'Banco Central',
        prices: [885, 898, 908, 915, 924, 917, 902, 881, 889]
    },
    {
        name: 'H2SO4', unit: 'USD/t SA', source: 'IMARC',
        prices: [149, 149, 149, 149, 140, 171, 246, 270, 300]
    }
];

// ═══ RENDER ═══
function formatNum(n) {
    if (n >= 10000) return n.toLocaleString('en-US');
    if (n >= 100) return n.toLocaleString('en-US');
    if (n >= 10) return n.toFixed(1);
    return n.toFixed(2);
}

function getChange(prices) {
    if (prices.length < 2) return { pct: 0, dir: 'flat' };
    var last = prices[prices.length - 1];
    var prev = prices[prices.length - 2];
    if (prev === 0) return { pct: 0, dir: 'flat' };
    var pct = ((last - prev) / prev) * 100;
    return { pct: pct, dir: pct > 0.05 ? 'up' : pct < -0.05 ? 'down' : 'flat' };
}

function buildSparkSVG(prices, id) {
    var W = 280, H = 60, PAD = 20;
    var min = Math.min.apply(null, prices);
    var max = Math.max.apply(null, prices);
    var range = max - min || 1;
    var n = prices.length;

    // Scale points
    var pts = prices.map(function(p, i) {
        var x = PAD + (i / (n - 1 || 1)) * (W - 2 * PAD);
        var y = PAD + (1 - (p - min) / range) * (H - 2 * PAD);
        return { x: x, y: y, val: p };
    });

    var polyPoints = pts.map(function(p) { return p.x + ',' + p.y; }).join(' ');
    var change = getChange(prices);
    var color = change.dir === 'up' ? '#22c55e' : change.dir === 'down' ? '#ef4444' : '#eab308';

    var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" style="height:60px;">';

    // Grid lines
    svg += '<line x1="' + PAD + '" y1="' + PAD + '" x2="' + (W - PAD) + '" y2="' + PAD + '" stroke="#D1D8E0" stroke-width="0.5" stroke-dasharray="4"/>';
    svg += '<line x1="' + PAD + '" y1="' + (H / 2) + '" x2="' + (W - PAD) + '" y2="' + (H / 2) + '" stroke="#D1D8E0" stroke-width="0.5" stroke-dasharray="4"/>';
    svg += '<line x1="' + PAD + '" y1="' + (H - PAD) + '" x2="' + (W - PAD) + '" y2="' + (H - PAD) + '" stroke="#D1D8E0" stroke-width="0.5" stroke-dasharray="4"/>';

    // Line
    svg += '<polyline points="' + polyPoints + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';

    // Points with edition labels
    pts.forEach(function(p, i) {
        svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="4" fill="' + color + '" stroke="white" stroke-width="2" data-idx="' + i + '" data-id="' + id + '"/>';
        // Edition label below/above point
        var labelY = p.y > H / 2 ? p.y - 10 : p.y + 16;
        svg += '<text x="' + p.x + '" y="' + labelY + '" text-anchor="middle" font-size="8" font-family="DM Sans" fill="#5B6E84" font-weight="600">' + EDITIONS[i].label + '</text>';
    });

    // Y-axis labels
    svg += '<text x="' + (PAD - 4) + '" y="' + (PAD + 3) + '" text-anchor="end" font-size="7" fill="#5B6E84" font-family="DM Mono">' + formatNum(max) + '</text>';
    svg += '<text x="' + (PAD - 4) + '" y="' + (H - PAD + 3) + '" text-anchor="end" font-size="7" fill="#5B6E84" font-family="DM Mono">' + formatNum(min) + '</text>';

    svg += '</svg>';
    return svg;
}

function buildRow(commodity, index) {
    var change = getChange(commodity.prices);
    var lastPrice = commodity.prices[commodity.prices.length - 1];
    var pctStr = (change.pct >= 0 ? '+' : '') + change.pct.toFixed(1) + '%';

    var html = '<div class="commodity-row" id="cr-' + index + '">';
    html += '<div class="cr-header" onclick="toggleRow(' + index + ')">';
    html += '<div class="cr-left">';
    html += '<span class="cr-dot ' + change.dir + '"></span>';
    html += '<span class="cr-name">' + commodity.name + '</span>';
    html += '</div>';
    html += '<span class="cr-price">' + formatNum(lastPrice) + '</span>';
    html += '<span class="cr-unit">' + commodity.unit + '</span>';
    html += '<span class="cr-change ' + change.dir + '">' + pctStr + '</span>';
    html += '<span class="cr-arrow">&#9660;</span>';
    html += '</div>';

    // Detail
    html += '<div class="cr-detail">';

    // Chart
    html += '<div class="chart-wrap">';
    html += buildSparkSVG(commodity.prices, index);
    html += '</div>';

    // Data table
    html += '<table class="cr-table"><thead><tr><th>Edicion</th><th>Fecha</th><th>Precio</th><th>Var.</th></tr></thead><tbody>';
    commodity.prices.forEach(function(p, i) {
        var varStr = '—';
        if (i > 0) {
            var v = ((p - commodity.prices[i - 1]) / commodity.prices[i - 1]) * 100;
            varStr = '<span class="' + (v >= 0 ? 'up' : 'down') + '">' + (v >= 0 ? '+' : '') + v.toFixed(1) + '%</span>';
        }
        html += '<tr><td>' + EDITIONS[i].label + '</td><td>' + EDITIONS[i].date + '</td><td>' + formatNum(p) + ' ' + commodity.unit + '</td><td>' + varStr + '</td></tr>';
    });
    html += '</tbody></table>';
    html += '<div class="src">Fuente: ' + commodity.source + '</div>';
    html += '</div></div>';
    return html;
}

function toggleRow(idx) {
    var el = document.getElementById('cr-' + idx);
    el.classList.toggle('open');
}

// Build all rows
var container = document.getElementById('commodity-list');
var allHtml = '';
COMMODITIES.forEach(function(c, i) {
    allHtml += buildRow(c, i);
});
container.innerHTML = allHtml;
</script>
</body>
</html>
