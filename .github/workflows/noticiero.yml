name: Generar Noticiero Minero

on:
  schedule:
    # Cada martes a las 11:00 UTC (8:00 AM hora Chile en verano)
    - cron: '0 11 * * 2'
  workflow_dispatch:
    # Permite ejecutar manualmente desde GitHub Actions → Run workflow

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para hacer git push

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic markdown

      - name: Generar noticiero
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generar_noticiero.py

      - name: Publicar nueva edición
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add *.html *.md
          git diff --staged --quiet || git commit -m "Noticiero $(date +%Y-%m-%d) — generado automáticamente"
          git push
